<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZETUGEN | Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #03050a; --card: rgba(13, 17, 28, 0.8); --free: #10b981; --prem: #a855f7; --paid: #f59e0b; }
        body { background-color: var(--bg); color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .sync-font { font-family: 'Syncopate', sans-serif; letter-spacing: -0.05em; font-size: 10px; }
        .glass-card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; backdrop-filter: blur(15px); }
        .tier-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; transition: all 0.3s; flex: 1; cursor: pointer; text-align: center; }
        .tier-btn.active-free { border-color: var(--free); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.05); }
        .tier-btn.active-prem { border-color: var(--prem); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); background: rgba(168, 85, 247, 0.05); }
        .tier-btn.active-paid { border-color: var(--paid); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); background: rgba(245, 158, 11, 0.05); }
        .btn-gen { background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%); box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4); border-radius: 14px; }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto">
    <header class="flex justify-between items-center mb-10">
        <h1 class="text-xl font-black sync-font italic text-blue-500">ZETU<span class="text-white">GEN</span></h1>
        <button id="loginBtn" onclick="authDiscord()" class="bg-[#5865f2] px-4 py-2 rounded-lg text-[9px] font-bold sync-font">LOGIN WITH DISCORD</button>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-5"><p class="text-[8px] text-gray-500 sync-font mb-2">📦 TOTAL ACCOUNTS</p><h2 id="stat-total" class="text-3xl font-bold">0</h2></div>
        <div class="glass-card p-5"><p class="text-[8px] text-gray-500 sync-font mb-2">📁 SERVICES</p><h2 id="stat-services" class="text-3xl font-bold">0</h2></div>
        <div class="glass-card p-5"><p class="text-[8px] text-gray-500 sync-font mb-2">🎯 TOTAL GENS</p><h2 class="text-3xl font-bold">32</h2></div>
        <div class="glass-card p-5"><p class="text-[8px] text-gray-500 sync-font mb-2">🕒 LAST REFRESH</p><h2 id="timer" class="text-xl font-bold text-blue-400">00:00:00</h2></div>
    </div>

    <div class="glass-card p-6 mb-8">
        <h2 class="text-[10px] sync-font mb-8 text-center">⚡ GENERATE ACCOUNT</h2>
        <div class="space-y-6">
            <div class="flex gap-2">
                <div id="btn-FREE" onclick="setTier('FREE')" class="tier-btn active-free sync-font font-bold">FREE</div>
                <div id="btn-PREMIUM" onclick="setTier('PREMIUM')" class="tier-btn sync-font font-bold">PREMIUM</div>
                <div id="btn-PAID" onclick="setTier('PAID')" class="tier-btn sync-font font-bold">PAID</div>
            </div>
            <select id="serSelect" class="w-full bg-black border border-white/10 p-4 rounded-xl font-bold text-sm outline-none text-white appearance-none"></select>
            <button onclick="handleGenerate()" class="w-full btn-gen py-4 text-[11px] sync-font font-bold flex justify-center items-center gap-3">GENERATE NOW</button>
        </div>
    </div>

    <div><h3 class="text-[10px] sync-font text-gray-500 mb-5">LIVE STOCK <span class="text-green-500 float-right">● REAL-TIME</span></h3><div id="stockList" class="space-y-3"></div></div>

    <script>
        const API_URL = 'http://localhost:3000';
        let currentTier = 'FREE';
        let lastRefreshTime = new Date();
        let botStock = [];

        async function fetchStock() {
            try {
                const res = await fetch(`${API_URL}/api/stock`);
                botStock = await res.json();
                lastRefreshTime = new Date();
                updateUI();
            } catch (e) { console.log("Connecting to bot..."); }
        }

        function updateRefreshTimer() {
            const diff = Math.floor((new Date() - lastRefreshTime) / 1000);
            const h = String(Math.floor(diff / 3600)).padStart(2, '0');
            const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }

        function setTier(t) {
            currentTier = t;
            document.querySelectorAll('.tier-btn').forEach(b => b.className = 'tier-btn sync-font font-bold');
            document.getElementById(`btn-${t}`).classList.add(t === 'FREE' ? 'active-free' : t === 'PREMIUM' ? 'active-prem' : 'active-paid');
            updateUI();
        }

        function updateUI() {
            const filtered = botStock.filter(s => s.tier === currentTier);
            document.getElementById('serSelect').innerHTML = filtered.map(s => `<option value="${s.service}">${s.service} [${s.count}]</option>`).join('');
            document.getElementById('stat-total').innerText = botStock.reduce((a, b) => a + b.count, 0);
            document.getElementById('stat-services').innerText = botStock.length;
            document.getElementById('stockList').innerHTML = botStock.map(s => `
                <div class="glass-card p-4 flex justify-between items-center" style="border-left: 4px solid ${s.color}">
                    <span class="text-[10px] font-bold sync-font" style="color: ${s.color}">${s.service}</span>
                    <span class="text-sm font-bold text-white">${s.count}</span>
                </div>`).join('');
        }

        async function handleGenerate() {
            const service = document.getElementById('serSelect').value;
            const res = await fetch(`${API_URL}/api/generate`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: 'USER_ID_HERE', service, tier: currentTier })
            });
            const data = await res.json();
            alert(data.message);
        }

        window.onload = () => { fetchStock(); setInterval(updateRefreshTimer, 1000); setInterval(fetchStock, 30000); };
    </script>
</body>
</html>
